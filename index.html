<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Tracker</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cash Tracker">
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;display:flex;justify-content:center}
.container{width:100%;max-width:420px;padding:20px}
.card{background:#18181b;border-radius:22px;padding:20px;margin-bottom:14px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.balance{font-size:42px;font-weight:700;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
button{border:none;border-radius:20px;padding:16px;font-size:16px;font-weight:700;color:#fff;cursor:pointer}
.in{background:#16a34a}.out{background:#dc2626}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #27272a}
.row:last-child{border-bottom:none}
small{color:#a1a1aa}
input{width:100%;padding:12px;border:none;border-radius:14px;background:#27272a;color:#fff;margin:6px 0;box-sizing:border-box}button.full{width:100%}.green{background:#16a34a}.red{background:#dc2626}
</style>
<script>
let appPasscode=localStorage.getItem('appPasscode') || '1234';
localStorage.removeItem('unlocked');
if(localStorage.getItem('unlocked')!=='yes'){
const entered=prompt('🔒 Enter iPhone Style Passcode');
if(entered===appPasscode){localStorage.setItem('unlocked','yes');}
else{
document.addEventListener('DOMContentLoaded',()=>{
 document.body.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:28px">Access Denied</div>';
});
throw new Error('locked');
}
}
</script>
</head>
<body>
<div class="container">
<div style="display:flex;justify-content:space-between;align-items:center"><h1>Cash Tracker</h1><a href="settings.html" style="color:#fff;text-decoration:none;background:#27272a;padding:10px 14px;border-radius:14px">⚙️ Settings</a></div>
<div class="card">
<small>Current Cash</small>
<div class="balance">₹12,000</div>
</div>
<div class="card">
<input id="name" placeholder="Enter name (Food, Salary...)">
<input id="amount" type="number" placeholder="Enter amount">
<div class="grid">
<button class="green" onclick="addTransaction('income')">+ Add Income</button>
<button class="red" onclick="addTransaction('expense')">- Add Expense</button>
</div>
</div>
<div class="card">
<h3>Recent Transactions</h3>
<div id="list"></div>
</div>
<script>
let balance=parseFloat(localStorage.getItem('balance')) || 0;
let list=JSON.parse(localStorage.getItem('transactions') || '[]');
function render(){
localStorage.setItem('balance', balance);
localStorage.setItem('transactions', JSON.stringify(list));
document.querySelector('.balance').innerText='₹'+balance.toLocaleString();
const box=document.getElementById('list');
box.innerHTML='';
list.slice().reverse().forEach(t=>{
box.innerHTML += `<div class="row"><span>${t.name}</span><span>${t.type==='income'?'+':'-'}₹${t.amount}</span></div>`;
});
}
function addTransaction(type){
const name=document.getElementById('name').value.trim();
const amount=parseFloat(document.getElementById('amount').value);
if(!name||!amount)return;
if(type==='income') balance+=amount; else balance-=amount;
list.push({name,amount,type});
document.getElementById('name').value='';
document.getElementById('amount').value='';
render();
}
render();
</script>
</body>
</html>
