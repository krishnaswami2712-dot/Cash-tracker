<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Tracker</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;display:flex;justify-content:center}
.container{width:100%;max-width:420px;padding:20px}
.card{background:#18181b;border-radius:22px;padding:20px;margin-bottom:14px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.balance{font-size:42px;font-weight:700;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
button{border:none;border-radius:20px;padding:16px;font-size:16px;font-weight:700;color:#fff;cursor:pointer}
.in{background:#16a34a}.out{background:#dc2626}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #27272a}
.row:last-child{border-bottom:none}
small{color:#a1a1aa}
input{width:100%;padding:12px;border:none;border-radius:14px;background:#27272a;color:#fff;margin:6px 0;box-sizing:border-box}button.full{width:100%}.green{background:#16a34a}.red{background:#dc2626}
</style>
</head>
<body>
<div class="container">
<h1>Cash Tracker</h1>
<div class="card">
<small>Current Cash</small>
<div class="balance">₹12,000</div>
</div>
<div class="card">
<input id="name" placeholder="Enter name (Food, Salary...)">
<input id="amount" type="number" placeholder="Enter amount">
<div class="grid">
<button class="green" onclick="addTransaction('income')">+ Add Income</button>
<button class="red" onclick="addTransaction('expense')">- Add Expense</button>
</div>
</div>
<div class="card">
<h3>Recent Transactions</h3>
<div id="list"></div>
</div>
<script>
let balance=0;
let list=[];
function render(){
document.querySelector('.balance').innerText='₹'+balance.toLocaleString();
const box=document.getElementById('list');
box.innerHTML='';
list.slice().reverse().forEach(t=>{
box.innerHTML += `<div class="row"><span>${t.name}</span><span>${t.type==='income'?'+':'-'}₹${t.amount}</span></div>`;
});
}
function addTransaction(type){
const name=document.getElementById('name').value.trim();
const amount=parseFloat(document.getElementById('amount').value);
if(!name||!amount)return;
if(type==='income') balance+=amount; else balance-=amount;
list.push({name,amount,type});
document.getElementById('name').value='';
document.getElementById('amount').value='';
render();
}
render();
</script>
</body>
</html>
